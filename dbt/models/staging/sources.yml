version: 2

sources:
  - name: raw
    database: MANUFACTURING_QUALITY
    schema: RAW
    description: "Raw source data and machine assignments from AI4I dataset and synthetic generation"
    tables:
      - name: ai4i_sensor_readings
        description: "Raw sensor readings from the AI4I 2020 predictive maintenance dataset. One row per production cycle with process parameters and failure flags."

      - name: machine_assignments
        description: "Machine assignment mapping showing which UDIs belong to which machine. Derived by partitioning source dataset into sequential blocks snapped to tool wear reset points."

      - name: operator_assignments
        description: "Operator assignment mapping showing which operator was assigned to each UDI. Operators are assigned by machine group, shift preference, and weekly rotation."

  - name: raw_synthetic
    database: MANUFACTURING_QUALITY
    schema: RAW_SYNTHETIC
    description: "Synthetically generated dimension and operational context tables"
    tables:
      - name: machines
        description: "Machine dimension. One row per CNC machine with installation date, type, and rated tool life."

      - name: maintenance_log
        description: "Tool replacement and maintenance events. One row per reset point with maintenance type, date, and duration."

      - name: operators
        description: "Operator dimension. One row per CNC machine operator with experience level, hire date, and certifications."

      - name: shifts
        description: "Shift dimension. One row per shift slot covering the full operating period with supervisor assignment."